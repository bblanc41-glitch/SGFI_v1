<div class="notif-page">
  <div class="notif-card">
    <h2><i class="bi bi-bell-fill"></i> Notifications</h2>

    <!-- Spinner de chargement -->
    <div *ngIf="chargement" class="loading-spinner">Chargement...</div>

    <!-- Liste des notifications -->
    <ul class="notif-list" *ngIf="!chargement">
      <li *ngFor="let n of notifications" [class.lue]="n.lu">
        <div class="notif-content">
          <span class="notif-message">{{ n.message }}</span>
          <span class="notif-date">{{ n.dateCreation | date:'dd/MM/yyyy HH:mm' }}</span>
          <span class="notif-type badge" 
                [ngClass]="{'bg-warning': n.type === 'DOUBLON_IMPORT', 'bg-info': n.type === 'STATUT_CHANGE'}">
            {{ n.type }}
          </span>
        </div>
        <div class="notif-actions">
          <button *ngIf="!n.lu" (click)="marquerLue(n.id)" class="btn-lue">✓ Marquer lue</button>
          <button (click)="supprimer(n.id)" class="btn-suppr">🗑️</button>
        </div>
      </li>
      <li *ngIf="notifications.length === 0">Aucune notification.</li>
    </ul>
  </div>
</div>
