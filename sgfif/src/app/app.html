<!-- BARRE DE NAVIGATION VERTICALE (SIDEBAR)
     *ngIf="estConnecte()" → masquée sur /login, visible sur toutes les autres routes -->
<aside class="sgfi-sidebar" *ngIf="estConnecte()">

  <!-- Identité utilisateur -->
  <div class="sidebar-user">
    <div class="avatar-circle">{{ userInitials }}</div>
    <div class="sidebar-user-info">
      <div class="sidebar-username">{{ username }}</div>
      <div class="sidebar-role">{{ userRole }}</div>
    </div>
  </div>

  <hr class="sidebar-divider" />

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <a class="sidebar-item"
       [class.active]="activeMenu === 'dashboard'"
       (click)="setMenu('dashboard')"
       routerLink="/dashboard">
      <i class="bi bi-grid-1x2-fill s-icon"></i>
      Tableau de bord
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'dossiers'"
       (click)="setMenu('dossiers')"
       routerLink="/liste-dossiers">
      <i class="bi bi-folder2-open s-icon"></i>
      Dossiers
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'saisie'"
       (click)="setMenu('saisie')"
       routerLink="/saisie-manuelle">
      <i class="bi bi-pencil-square s-icon"></i>
      Saisie manuelle
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'importation'"
       (click)="setMenu('importation')"
       routerLink="/importation">
      <i class="bi bi-upload s-icon"></i>
      Importation CCR
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'bordereau'"
       (click)="setMenu('bordereau')"
       routerLink="/bordereau">
      <i class="bi bi-file-pdf-fill s-icon"></i>
      Générer bordereau
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'alertes'"
       (click)="setMenu('alertes')"
       routerLink="/dashboard">
      <i class="bi bi-exclamation-triangle-fill s-icon"></i>
      Alertes
      <span class="alert-badge" *ngIf="alertesCount > 0">{{ alertesCount }}</span>
    </a>

    <a class="sidebar-item"
       [class.active]="activeMenu === 'notifications'"
       (click)="setMenu('notifications')"
       routerLink="/notifications">
      <i class="bi bi-bell-fill s-icon"></i>
      Notifications
      <span class="notif-badge" *ngIf="notifCount > 0">{{ notifCount }}</span>
    </a>

  </nav>

  <hr class="sidebar-divider" />

  <!-- Déconnexion en bas de sidebar -->
  <button class="btn-logout" (click)="deconnexion()">
    <i class="bi bi-box-arrow-left"></i>
    Déconnexion
  </button>

</aside>

<!-- Contenu principal avec margin-left pour la sidebar -->
<main [class.with-sidebar]="estConnecte()">
  <router-outlet></router-outlet>
</main>
